<svg width="100%" height="16" viewBox="0 0 900 16" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <line x1="0" y1="4" x2="900" y2="4" stroke="#1B2430" stroke-width="2"/>
  <line x1="0" y1="12" x2="900" y2="12" stroke="#1B2430" stroke-width="2"/>

  <line x1="0" y1="4" x2="900" y2="4" stroke="#00D9FF" stroke-width="2" stroke-dasharray="60 30">
    <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="3.2s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="12" x2="900" y2="12" stroke="#FFB703" stroke-width="2" stroke-dasharray="60 30">
    <animate attributeName="stroke-dashoffset" from="-180" to="0" dur="3.2s" repeatCount="indefinite"/>
  </line>
</svg>
